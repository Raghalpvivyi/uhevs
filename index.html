
<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة المحيبس - أونلاين</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body dir="rtl" class="mobile-like">

<div id="screen-login" class="screen active">
<h1>لعبة المحيبس</h1>
<div class="card center">
<input id="input-name" placeholder="اكتب اسمك هنا" maxlength="18" />
<div class="row">
<button id="btn-create">إنشاء غرفة</button>
<button id="btn-join">انضم لغرفة</button>
</div>
<input id="input-room" placeholder="أدخل رمز الغرفة" maxlength="6" />
</div>
</div>

<div id="screen-room" class="screen">
<header class="topbar">
<div id="room-code">رمز الغرفة</div>
<button id="btn-start">بدء اللعبة</button>
</header>

<main class="container">
<div class="card">
<h3>اللاعبون</h3>
<div id="players-list"></div>
</div>

<div class="card">
<h3>النقاط</h3>
الباحث: <span id="score-search">0</span><br>
المخفي: <span id="score-hidden">0</span>
</div>

<div class="card">
<h3>الدردشة</h3>
<div id="chat-public" class="chat-box"></div>
<input id="chat-msg" placeholder="رسالة">
<button id="send-chat">إرسال</button>
</div>

</main>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
